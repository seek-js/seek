name: CI

on:
  push:
    branches:
      - main
      - init
      - feat/**
      - docs/**
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Setup Bun
      uses: oven-sh/setup-bun@v2

      # Prefer deterministic installs in CI. If a Bun-specific cross-platform
      # lockfile edge case appears, use an explicit team-approved fallback.
      - name: Install dependencies
      run: bun install --frozen-lockfile

      - name: Typecheck
      run: bun run typecheck

      - name: Test
      run: bun run test

      - name: Lint
      run: bun run lint

      - name: Format check
      run: bun run format:check

      - name: Build
      run: bun run build
